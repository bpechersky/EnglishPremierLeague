<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premier League 2025/26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0e1a;
      font-family: 'Source Sans 3', 'Georgia', sans-serif;
      color: #e8e4d8;
      min-height: 100vh;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #38d; border-radius: 2px; }

    /* ── HEADER ── */
    #header {
      background: linear-gradient(135deg, #0d1b2a 0%, #1a0a2e 50%, #0d1b2a 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }
    #header-inner { max-width: 940px; margin: 0 auto; }
    #title-bar {
      display: flex; align-items: center; gap: 16;
      padding: 24px 0 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #logo {
      width: 52px; height: 52px; flex-shrink: 0;
      background: linear-gradient(135deg, #3e0dff, #9d00ff);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 20px rgba(100,0,255,0.4);
    }
    #title-text .main {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 900;
      background: linear-gradient(90deg, #fff 0%, #c0a0ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px; line-height: 1.1;
    }
    #title-text .sub {
      color: #9080c0; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; font-weight: 300;
    }
    #matchweek { margin-left: auto; text-align: right; }
    #matchweek .label { color: #60efb0; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    #matchweek .value { color: #fff; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }

    /* ── TABS ── */
    #tabs { display: flex; gap: 0; padding-top: 4px; }
    .tab-btn {
      padding: 12px 20px 10px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #6060a0;
      border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #7c3aed; }
    .tab-btn:hover:not(.active) { opacity: 0.8; }

    /* ── CONTENT ── */
    #content { max-width: 940px; margin: 0 auto; padding: 24px 20px; }

    /* ── ANIMATIONS ── */
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    /* ── LEGEND ── */
    .legend { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* ── STANDINGS TABLE ── */
    .standings-header, .standings-row {
      display: grid;
      grid-template-columns: 36px 1fr 42px 42px 42px 42px 52px 62px 62px;
      gap: 6px; padding: 8px 14px; align-items: center;
    }
    .standings-header {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #555; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .standings-row {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      border-left: 3px solid transparent; border-radius: 4px;
      cursor: default; transition: background 0.2s;
    }
    .standings-row:hover { background: rgba(255,255,255,0.05); }
    .standings-row.ucl { border-left-color: #60efb0; background: rgba(96,239,176,0.03); }
    .standings-row.uel { border-left-color: #60b4ef; }
    .standings-row.rel { border-left-color: #ef6060; background: rgba(239,96,96,0.03); }

    .cell-center { display: flex; align-items: center; justify-content: center; font-size: 13px; color: #bbb; }
    .pts-cell { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 900; color: #fff; }
    .pts-ucl { color: #60efb0; }
    .pts-rel { color: #ef9090; }
    .gd-pos { color: #60efb0; }
    .gd-neg { color: #ef9090; }

    /* ── BADGE ── */
    .badge {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      flex-shrink: 0; letter-spacing: -0.5px;
      font-size: 11px;
    }

    /* ── MATCH CARD ── */
    .match-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 16px 20px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 16;
    }
    .match-score-box {
      display: flex; align-items: center; gap: 6;
      background: rgba(0,0,0,0.4); border-radius: 8;
      padding: 8px 16px;
    }
    .score-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; }
    .score-sep { color: #444; font-size: 20px; font-weight: 300; }
    .match-date-label { font-size: 10px; color: #444; letter-spacing: 1px; margin-top: 4px; text-transform: uppercase; text-align: center; }

    /* ── FIXTURE CARD ── */
    .fixture-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 16px 20px;
    }
    .fixture-time-badge {
      background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
      border-radius: 6px; padding: 4px 10px;
      font-size: 11px; color: #c0a0ff; letter-spacing: 1px; text-transform: uppercase;
    }

    /* ── PROB BAR ── */
    .prob-bar { display: flex; border-radius: 6px; overflow: hidden; height: 6px; margin-bottom: 8px; }
    .prob-labels { display: flex; justify-content: space-between; font-size: 11px; }

    /* ── ADD RESULT MODAL ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: linear-gradient(135deg, #111827, #1a1035);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      animation: fadeIn 0.25s ease;
    }
    #modal h2 {
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900;
      margin-bottom: 6px;
    }
    #modal .modal-sub { color: #6060a0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }

    .form-row { display: grid; grid-template-columns: 1fr 60px; gap: 12px; margin-bottom: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
    .vs-label { text-align: center; color: #6060a0; font-size: 13px; font-weight: 600; letter-spacing: 1px; }

    label { display: block; font-size: 11px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    select, input[type="number"], input[type="text"] {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: #e8e4d8; font-size: 14px; padding: 10px 12px;
      outline: none; transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: #7c3aed; }
    select option { background: #1a1035; }

    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 8px; font-size: 14px;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #9d00ff); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #888; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    #form-error { color: #ef6060; font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── ADD RESULT FAB ── */
    #add-btn {
      position: fixed; bottom: 28px; right: 28px;
      background: linear-gradient(135deg, #7c3aed, #9d00ff);
      color: #fff; border: none; border-radius: 14px;
      padding: 14px 22px; font-size: 14px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; z-index: 900;
      box-shadow: 0 6px 24px rgba(124,58,237,0.5);
      transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    }
    #add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.7); }

    #add-team-btn {
      position: fixed; bottom: 28px; right: 200px;
      background: linear-gradient(135deg, #1a8a5a, #22c55e);
      color: #fff; border: none; border-radius: 14px;
      padding: 14px 22px; font-size: 14px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; z-index: 900;
      box-shadow: 0 6px 24px rgba(34,197,94,0.5);
      transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    }
    #add-team-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(34,197,94,0.7); }

    #team-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    #team-modal-overlay.open { display: flex; }
    #team-modal {
      background: linear-gradient(135deg, #111827, #1a1035);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      animation: fadeIn 0.25s ease;
    }
    #team-modal h2 {
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900;
      margin-bottom: 6px;
    }
    #team-modal .modal-sub { color: #6060a0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
    #team-form-error { color: #ef6060; font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 90px; right: 28px; z-index: 1100;
      background: #1a3a1a; border: 1px solid #60efb0;
      color: #60efb0; border-radius: 10px; padding: 12px 20px;
      font-size: 13px; font-weight: 600; letter-spacing: 1px;
      display: none; animation: fadeIn 0.3s ease;
    }
    #toast.err { background: #3a1a1a; border-color: #ef6060; color: #ef6060; }

    /* ── SECTION TITLE ── */
    .section-title { font-family: 'Playfair Display', serif; font-size: 13px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 20px; font-size: 11px; color: #333; letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.04); margin-top: 20px; }

    /* ── TEAM NAME ── */
    .team-name-main { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: #e8e4d8; }
    .team-name-dim  { color: #888; }
    .team-name-link { cursor: pointer; transition: color 0.2s; }
    .team-name-link:hover { color: #c0a0ff; }

    /* ── TEAM PAGE ── */
    .team-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: #7c3aed; font-size: 13px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; margin-bottom: 24px;
      transition: color 0.2s; border: none; background: none;
    }
    .team-back:hover { color: #c0a0ff; }

    .team-hero {
      display: flex; align-items: center; gap: 24px;
      padding: 28px 24px; margin-bottom: 28px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .team-hero-info h2 {
      font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900;
      color: #fff; line-height: 1.1;
    }
    .team-hero-info .team-rank-badge {
      display: inline-block; margin-top: 6px;
      padding: 3px 10px; border-radius: 6px; font-size: 11px;
      font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    }

    .team-stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px; margin-bottom: 28px;
    }
    .team-stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .team-stat-card .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 900; color: #fff;
    }
    .team-stat-card .stat-label {
      font-size: 10px; color: #666; letter-spacing: 2px;
      text-transform: uppercase; margin-top: 2px;
    }

    .team-form { display: flex; gap: 6px; margin-bottom: 28px; }
    .form-badge {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .form-W { background: #22c55e; }
    .form-D { background: #888; }
    .form-L { background: #ef4444; }

    .team-section-title {
      font-family: 'Playfair Display', serif; font-size: 13px;
      color: #666; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 14px; margin-top: 8px;
    }

    /* ── SCORE HIGHLIGHT ── */
    .win  { color: #60efb0 !important; }
    .loss { color: #888 !important; }

    @media (max-width: 700px) {
      .standings-header, .standings-row {
        grid-template-columns: 28px 1fr 36px 36px 36px 36px 44px 52px 52px;
        gap: 3px; padding: 6px 8px;
      }
      .standings-header .col-gf,
      .standings-header .col-ga,
      .standings-row .col-gf,
      .standings-row .col-ga { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-inner">
    <div id="title-bar">
      <div id="logo">⚽</div>
      <div id="title-text">
        <div class="main">Premier League</div>
        <div class="sub">2025 / 2026 Season</div>
      </div>
      <div id="matchweek">
        <div class="label">Live Data</div>
        <div class="value" id="mw-label">Matchweek 30</div>
      </div>
    </div>
    <div id="tabs">
      <button class="tab-btn active" data-tab="standings">Table</button>
      <button class="tab-btn"        data-tab="results">Results</button>
      <button class="tab-btn"        data-tab="fixtures">Fixtures</button>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- FOOTER -->
<footer>Live data · Premier League 2025–26 · <span id="footer-mw">Matchweek 30</span></footer>

<!-- ADD RESULT BUTTON -->
<button id="add-btn">＋ Add Result</button>
<button id="add-team-btn">＋ Add Team</button>

<!-- MODAL: ADD RESULT -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add Match Result</h2>
    <div class="modal-sub">Update standings automatically</div>

    <div class="form-row-3">
      <div>
        <label>Home Team</label>
        <select id="sel-home"></select>
      </div>
      <div class="vs-label">VS</div>
      <div>
        <label>Away Team</label>
        <select id="sel-away"></select>
      </div>
    </div>

    <div class="form-row-3">
      <div>
        <label>Home Score</label>
        <input type="number" id="inp-hs" min="0" max="20" value="0" />
      </div>
      <div class="vs-label" style="font-size:20px;padding-top:20px;">–</div>
      <div>
        <label>Away Score</label>
        <input type="number" id="inp-as" min="0" max="20" value="0" />
      </div>
    </div>

    <div>
      <label>Match Date</label>
      <input type="text" id="inp-date" placeholder="e.g. Mar 5" />
    </div>

    <div id="form-error"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="modal-submit">Add Result</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD TEAM -->
<div id="team-modal-overlay">
  <div id="team-modal">
    <h2>Add New Team</h2>
    <div class="modal-sub">Add a team to the league</div>

    <div>
      <label>Team Name</label>
      <input type="text" id="inp-team-name" placeholder="e.g. Leicester City" />
    </div>

    <div style="margin-top:16px;">
      <label>Abbreviation (2-4 letters)</label>
      <input type="text" id="inp-team-abbr" placeholder="e.g. LEI" maxlength="4" style="text-transform:uppercase;" />
    </div>

    <div class="form-row-3" style="margin-top:16px;">
      <div>
        <label>Primary Color</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="color" id="inp-team-color1" value="#0053A0" style="width:42px;height:36px;padding:2px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);cursor:pointer;" />
          <span id="color1-hex" style="font-size:12px;color:#888;font-family:monospace;">#0053A0</span>
        </div>
      </div>
      <div></div>
      <div>
        <label>Secondary Color</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="color" id="inp-team-color2" value="#FFFFFF" style="width:42px;height:36px;padding:2px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);cursor:pointer;" />
          <span id="color2-hex" style="font-size:12px;color:#888;font-family:monospace;">#FFFFFF</span>
        </div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <label>Preview</label>
      <div id="team-preview" style="display:flex;align-items:center;gap:12px;margin-top:6px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);min-height:50px;">
        <span style="color:#555;font-size:13px;">Fill in the fields above to see a preview</span>
      </div>
    </div>

    <div id="team-form-error"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="team-modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="team-modal-submit">Add Team</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = '';   // Same origin - empty base

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  tab: 'standings',
  standings: [],
  results: [],
  fixtures: [],
  teams: [],
};

// ── TEAM COLORS ─────────────────────────────────────────────────────────────
const COLORS = {
  ARS:{p:"#EF0107",s:"#063672"}, MCI:{p:"#6CABDD",s:"#1C2C5B"},
  MUN:{p:"#DA291C",s:"#FBE122"}, AVL:{p:"#95BFE5",s:"#670E36"},
  CFC:{p:"#034694",s:"#DBA111"}, LFC:{p:"#C8102E",s:"#00B2A9"},
  BRE:{p:"#E30613",s:"#FBB800"}, EVE:{p:"#003399",s:"#FFFFFF"},
  BOU:{p:"#DA291C",s:"#000000"}, FUL:{p:"#000000",s:"#CC0000"},
  SUN:{p:"#EB172B",s:"#000000"}, NEW:{p:"#241F20",s:"#00A650"},
  BRI:{p:"#0057B8",s:"#FFCD00"}, CRY:{p:"#1B458F",s:"#C4122E"},
  LEE:{p:"#FFCD00",s:"#1D428A"}, TOT:{p:"#132257",s:"#FFFFFF"},
  NFO:{p:"#DD0000",s:"#FFFFFF"}, WHU:{p:"#7A263A",s:"#1BB1E7"},
  BUR:{p:"#6C1D45",s:"#99D6EA"}, WOL:{p:"#FDB913",s:"#231F20"},
};

function getColor(abbr) { return COLORS[abbr] || {p:'#888',s:'#333'}; }

// ── BADGE ───────────────────────────────────────────────────────────────────
function badge(abbr, size=34) {
  const c = getColor(abbr);
  return `<div class="badge" style="
    width:${size}px;height:${size}px;
    background:radial-gradient(circle at 35% 35%, ${c.p}cc, ${c.p});
    border:2px solid ${c.p}66;
    box-shadow:0 2px 8px ${c.p}44;
    font-size:${Math.round(size*0.35)}px;">${abbr.slice(0,2)}</div>`;
}

// ── FETCH HELPERS ───────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadAll() {
  const [standings, results, fixtures, teams] = await Promise.all([
    fetchJSON('/api/standings'),
    fetchJSON('/api/results'),
    fetchJSON('/api/fixtures'),
    fetchJSON('/api/teams'),
  ]);
  state.standings = standings;
  state.results   = results;
  state.fixtures  = fixtures;
  state.teams     = teams;
  updateMatchweek();
  render();
  populateTeamSelects();
}

function updateMatchweek() {
  const gp = state.standings.reduce((s,t) => s + t.gp, 0) / state.standings.length;
  const mw = 'Matchweek ' + Math.round(gp);
  document.getElementById('mw-label').textContent   = mw;
  document.getElementById('footer-mw').textContent  = mw;
}

// ── TABS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tab = btn.dataset.tab;
    render();
  });
});

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  el.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'fade-in';

  if (state.tab === 'standings') div.innerHTML = renderStandings();
  else if (state.tab === 'results')  div.innerHTML = renderResults();
  else if (state.tab === 'fixtures') div.innerHTML = renderFixtures();
  else if (state.tab === 'team')     div.innerHTML = renderTeamPage();

  el.appendChild(div);
}

// ── STANDINGS ───────────────────────────────────────────────────────────────
function renderStandings() {
  const legend = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#60efb0"></div>Champions League</div>
      <div class="legend-item"><div class="legend-dot" style="background:#60b4ef"></div>Europa League</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef6060"></div>Relegation</div>
    </div>`;

  const header = `
    <div class="standings-header">
      <div>#</div><div>Club</div>
      <div class="cell-center">W</div>
      <div class="cell-center">D</div>
      <div class="cell-center">L</div>
      <div class="cell-center">GP</div>
      <div class="cell-center col-gf">GF</div>
      <div class="cell-center col-ga">GD</div>
      <div class="cell-center">Pts</div>
    </div>`;

  const rows = state.standings.map((t, i) => {
    const cls = t.rank <= 4 ? 'ucl' : t.rank <= 6 ? 'uel' : t.rank >= 18 ? 'rel' : '';
    const rankColor = t.rank<=4 ? '#60efb0' : t.rank<=6 ? '#60b4ef' : t.rank>=18 ? '#ef6060' : '#555';
    const ptsCls = t.rank<=4 ? 'pts-ucl' : t.rank>=18 ? 'pts-rel' : '';
    const gdStr = t.gd > 0 ? '+'+t.gd : t.gd;
    const gdCls = t.gd > 0 ? 'gd-pos' : t.gd < 0 ? 'gd-neg' : '';
    return `
      <div class="standings-row ${cls}" style="animation:fadeIn 0.3s ease ${i*0.025}s both">
        <div class="cell-center" style="color:${rankColor};font-weight:600;font-size:12px;">${t.rank}</div>
        <div style="display:flex;align-items:center;gap:10px;">
          ${badge(t.abbr, 32)}
          <div class="team-name-main team-name-link" onclick="openTeamPage('${t.abbr}')">${t.name}</div>
        </div>
        <div class="cell-center">${t.w}</div>
        <div class="cell-center">${t.d}</div>
        <div class="cell-center">${t.l}</div>
        <div class="cell-center">${t.gp}</div>
        <div class="cell-center col-gf">${t.gf}</div>
        <div class="cell-center col-ga ${gdCls}">${gdStr}</div>
        <div class="cell-center pts-cell ${ptsCls}">${t.pts}</div>
      </div>`;
  }).join('');

  return legend + header + rows;
}

// ── RESULTS ─────────────────────────────────────────────────────────────────
function renderResults() {
  const title = `<div class="section-title">Recent Results · 2025/26</div>`;
  const cards = state.results.map((m, i) => {
    const hWin = m.hs > m.as, aWin = m.as > m.hs;
    const hc = getColor(m.home), ac = getColor(m.away);
    return `
    <div class="match-card" style="animation:fadeIn 0.3s ease ${i*0.04}s both;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:12px;">
        ${badge(m.home, 40)}
        <div>
          <div class="team-name-main ${hWin?'win':''}${aWin?'':hWin?'':' '}">${m.home}</div>
          <div style="font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;">Home</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div class="match-score-box">
          <span class="score-num ${hWin?'win':aWin?'loss':''}">${m.hs}</span>
          <span class="score-sep">–</span>
          <span class="score-num ${aWin?'win':hWin?'loss':''}">${m.as}</span>
        </div>
        <div class="match-date-label">${m.date} · FT</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;justify-content:flex-end;">
        <div style="text-align:right;">
          <div class="team-name-main ${aWin?'win':''}">${m.away}</div>
          <div style="font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;">Away</div>
        </div>
        ${badge(m.away, 40)}
      </div>
    </div>`;
  }).join('');

  return title + `<div style="display:flex;flex-direction:column;">${cards}</div>`;
}

// ── FIXTURES ─────────────────────────────────────────────────────────────────
function renderFixtures() {
  const title = `<div class="section-title">Upcoming Fixtures · Win Probability</div>`;
  if (state.fixtures.length === 0) {
    return title + `<div style="text-align:center;padding:40px;color:#555;">No upcoming fixtures scheduled.</div>`;
  }
  const cards = state.fixtures.map((m, i) => {
    const maxP = Math.max(m.probH, m.probA, m.probD);
    const hc = getColor(m.home), ac = getColor(m.away);
    return `
    <div class="fixture-card" style="animation:fadeIn 0.3s ease ${i*0.04}s both;margin-bottom:12px;">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:10px;">
          ${badge(m.home, 38)}
          <div class="team-name-main">${m.home}</div>
        </div>
        <div class="fixture-time-badge">${m.date} · ${m.time}</div>
        <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
          <div class="team-name-main">${m.away}</div>
          ${badge(m.away, 38)}
        </div>
      </div>
      <div class="prob-bar">
        <div style="width:${m.probH}%;background:linear-gradient(90deg,${hc.p},${hc.p}aa);"></div>
        <div style="width:${m.probD}%;background:rgba(255,255,255,0.2);"></div>
        <div style="width:${m.probA}%;background:linear-gradient(90deg,${ac.p}aa,${ac.p});"></div>
      </div>
      <div class="prob-labels">
        <div style="color:${m.probH===maxP?'#60efb0':'#666'}">${m.home} ${m.probH}%</div>
        <div style="color:${m.probD===maxP?'#60efb0':'#555'}">Draw ${m.probD}%</div>
        <div style="color:${m.probA===maxP?'#60efb0':'#666'}">${m.probA}% ${m.away}</div>
      </div>
    </div>`;
  }).join('');

  return title + cards;
}

// ── TEAM PAGE ───────────────────────────────────────────────────────────────
async function openTeamPage(abbr) {
  try {
    const data = await fetchJSON(`/api/team/${abbr}`);
    state.tab = 'team';
    state.teamDetail = data;
    // Deactivate tab buttons
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    render();
  } catch(e) {
    showToast('Failed to load team: ' + e.message, true);
  }
}

function goBackToStandings() {
  state.tab = 'standings';
  state.teamDetail = null;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === 'standings');
  });
  render();
}

function renderTeamPage() {
  const d = state.teamDetail;
  const t = d.team;
  const c = getColor(t.abbr);

  const zoneLabel = t.rank <= 4 ? 'Champions League' : t.rank <= 6 ? 'Europa League' : t.rank >= 18 ? 'Relegation' : '';
  const zoneColor = t.rank <= 4 ? '#60efb0' : t.rank <= 6 ? '#60b4ef' : t.rank >= 18 ? '#ef6060' : '';

  let html = `
    <button class="team-back" onclick="goBackToStandings()">← Back to Table</button>

    <div class="team-hero" style="background:linear-gradient(135deg, ${c.p}15, ${c.p}08);">
      ${badge(t.abbr, 64)}
      <div class="team-hero-info">
        <h2>${t.name}</h2>
        <span class="team-rank-badge" style="background:${zoneColor || 'rgba(255,255,255,0.1)'};color:${zoneColor ? '#fff' : '#888'};">
          ${ordinal(t.rank)} Place${zoneLabel ? ' · ' + zoneLabel : ''}
        </span>
      </div>
    </div>

    <div class="team-stats-grid">
      <div class="team-stat-card"><div class="stat-val" style="color:#60efb0">${t.pts}</div><div class="stat-label">Points</div></div>
      <div class="team-stat-card"><div class="stat-val">${t.gp}</div><div class="stat-label">Played</div></div>
      <div class="team-stat-card"><div class="stat-val">${t.w}</div><div class="stat-label">Wins</div></div>
      <div class="team-stat-card"><div class="stat-val">${t.d}</div><div class="stat-label">Draws</div></div>
      <div class="team-stat-card"><div class="stat-val">${t.l}</div><div class="stat-label">Losses</div></div>
      <div class="team-stat-card"><div class="stat-val">${t.gf}</div><div class="stat-label">Goals For</div></div>
      <div class="team-stat-card"><div class="stat-val ${t.gd>0?'gd-pos':t.gd<0?'gd-neg':''}">${t.gd>0?'+':''}${t.gd}</div><div class="stat-label">Goal Diff</div></div>
    </div>`;

  // Form (last 5)
  if (d.form.length > 0) {
    html += `<div class="team-section-title">Form · Last ${d.form.length}</div>
      <div class="team-form">
        ${d.form.map(f => `<div class="form-badge form-${f}">${f}</div>`).join('')}
      </div>`;
  }

  // Results
  if (d.results.length > 0) {
    html += `<div class="team-section-title">Results</div>`;
    html += d.results.map((m, i) => {
      const hWin = m.hs > m.as, aWin = m.as > m.hs;
      return `
      <div class="match-card" style="animation:fadeIn 0.3s ease ${i*0.04}s both;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:12px;">
          ${badge(m.home, 36)}
          <div>
            <div class="team-name-main ${hWin?'win':''}">${m.home}</div>
            <div style="font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;">Home</div>
          </div>
        </div>
        <div style="text-align:center;">
          <div class="match-score-box">
            <span class="score-num ${hWin?'win':aWin?'loss':''}">${m.hs}</span>
            <span class="score-sep">–</span>
            <span class="score-num ${aWin?'win':hWin?'loss':''}">${m.as}</span>
          </div>
          <div class="match-date-label">${m.date} · FT</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;justify-content:flex-end;">
          <div style="text-align:right;">
            <div class="team-name-main ${aWin?'win':''}">${m.away}</div>
            <div style="font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;">Away</div>
          </div>
          ${badge(m.away, 36)}
        </div>
      </div>`;
    }).join('');
  }

  // Fixtures
  if (d.fixtures.length > 0) {
    html += `<div class="team-section-title" style="margin-top:28px;">Upcoming Fixtures</div>`;
    html += d.fixtures.map((m, i) => {
      const hc = getColor(m.home), ac = getColor(m.away);
      const maxP = Math.max(m.probH, m.probA, m.probD);
      return `
      <div class="fixture-card" style="animation:fadeIn 0.3s ease ${i*0.04}s both;margin-bottom:12px;">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:10px;">
            ${badge(m.home, 34)}
            <div class="team-name-main">${m.home}</div>
          </div>
          <div class="fixture-time-badge">${m.date} · ${m.time}</div>
          <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
            <div class="team-name-main">${m.away}</div>
            ${badge(m.away, 34)}
          </div>
        </div>
        <div class="prob-bar">
          <div style="width:${m.probH}%;background:linear-gradient(90deg,${hc.p},${hc.p}aa);"></div>
          <div style="width:${m.probD}%;background:rgba(255,255,255,0.2);"></div>
          <div style="width:${m.probA}%;background:linear-gradient(90deg,${ac.p}aa,${ac.p});"></div>
        </div>
        <div class="prob-labels">
          <div style="color:${m.probH===maxP?'#60efb0':'#666'}">${m.home} ${m.probH}%</div>
          <div style="color:${m.probD===maxP?'#60efb0':'#555'}">Draw ${m.probD}%</div>
          <div style="color:${m.probA===maxP?'#60efb0':'#666'}">${m.probA}% ${m.away}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (d.results.length === 0 && d.fixtures.length === 0) {
    html += `<div style="text-align:center;padding:40px;color:#555;">No matches found for this team.</div>`;
  }

  return html;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function populateTeamSelects() {
  const home = document.getElementById('sel-home');
  const away = document.getElementById('sel-away');
  [home, away].forEach(sel => {
    sel.innerHTML = state.teams.map(t =>
      `<option value="${t.abbr}">${t.abbr} – ${t.name}</option>`
    ).join('');
  });
  // Default away to second team
  if (state.teams.length > 1) away.value = state.teams[1].abbr;
}

document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('form-error').textContent = '';
  document.getElementById('inp-hs').value = '0';
  document.getElementById('inp-as').value = '0';
  document.getElementById('inp-date').value = '';
  document.getElementById('modal-overlay').classList.add('open');
});
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

document.getElementById('modal-submit').addEventListener('click', async () => {
  const home      = document.getElementById('sel-home').value;
  const away      = document.getElementById('sel-away').value;
  const homeScore = parseInt(document.getElementById('inp-hs').value);
  const awayScore = parseInt(document.getElementById('inp-as').value);
  const date      = document.getElementById('inp-date').value.trim();
  const errEl     = document.getElementById('form-error');

  if (home === away) { errEl.textContent = 'Home and away teams must differ.'; return; }
  if (!date)         { errEl.textContent = 'Please enter a match date.';      return; }
  if (isNaN(homeScore)||isNaN(awayScore)) { errEl.textContent = 'Invalid scores.'; return; }

  document.getElementById('modal-submit').textContent = 'Saving…';
  document.getElementById('modal-submit').disabled = true;

  try {
    const resp = await fetch('/api/result', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({home, away, homeScore, awayScore, date}),
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      errEl.textContent = data.error || 'Server error';
    } else {
      state.standings = data.standings;
      state.results   = data.results;
      state.fixtures  = data.fixtures;
      updateMatchweek();
      render();
      closeModal();
      showToast(`✓ ${home} ${homeScore}–${awayScore} ${away} added! Standings updated.`);
    }
  } catch(e) {
    errEl.textContent = 'Network error: ' + e.message;
  } finally {
    document.getElementById('modal-submit').textContent = 'Add Result';
    document.getElementById('modal-submit').disabled = false;
  }
});

// ── ADD TEAM MODAL ────────────────────────────────────────────────────────
document.getElementById('add-team-btn').addEventListener('click', () => {
  document.getElementById('team-form-error').textContent = '';
  document.getElementById('inp-team-name').value = '';
  document.getElementById('inp-team-abbr').value = '';
  document.getElementById('inp-team-color1').value = '#0053A0';
  document.getElementById('inp-team-color2').value = '#FFFFFF';
  document.getElementById('color1-hex').textContent = '#0053A0';
  document.getElementById('color2-hex').textContent = '#FFFFFF';
  updateTeamPreview();
  document.getElementById('team-modal-overlay').classList.add('open');
});
document.getElementById('team-modal-cancel').addEventListener('click', closeTeamModal);
document.getElementById('team-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('team-modal-overlay')) closeTeamModal();
});
function closeTeamModal() { document.getElementById('team-modal-overlay').classList.remove('open'); }

// Live preview
['inp-team-name','inp-team-abbr','inp-team-color1','inp-team-color2'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateTeamPreview);
});
document.getElementById('inp-team-color1').addEventListener('input', e => {
  document.getElementById('color1-hex').textContent = e.target.value.toUpperCase();
});
document.getElementById('inp-team-color2').addEventListener('input', e => {
  document.getElementById('color2-hex').textContent = e.target.value.toUpperCase();
});

function updateTeamPreview() {
  const name = document.getElementById('inp-team-name').value.trim();
  const abbr = document.getElementById('inp-team-abbr').value.trim().toUpperCase();
  const c1   = document.getElementById('inp-team-color1').value;
  const c2   = document.getElementById('inp-team-color2').value;
  const prev = document.getElementById('team-preview');

  if (!name && !abbr) {
    prev.innerHTML = '<span style="color:#555;font-size:13px;">Fill in the fields above to see a preview</span>';
    return;
  }

  const ab = abbr || '??';
  prev.innerHTML = `
    <div class="badge" style="
      width:42px;height:42px;
      background:radial-gradient(circle at 35% 35%, ${c1}cc, ${c1});
      border:2px solid ${c1}66;
      box-shadow:0 2px 8px ${c1}44;
      font-size:14px;">${ab.slice(0,2)}</div>
    <div>
      <div class="team-name-main" style="font-size:16px;">${name || 'Team Name'}</div>
      <div style="font-size:11px;color:#666;letter-spacing:1px;">${ab} · 0 Pts · 0 GP</div>
    </div>`;
}

document.getElementById('team-modal-submit').addEventListener('click', async () => {
  const name      = document.getElementById('inp-team-name').value.trim();
  const abbr      = document.getElementById('inp-team-abbr').value.trim().toUpperCase();
  const primary   = document.getElementById('inp-team-color1').value;
  const secondary = document.getElementById('inp-team-color2').value;
  const errEl     = document.getElementById('team-form-error');

  if (!name)  { errEl.textContent = 'Please enter a team name.'; return; }
  if (!abbr)  { errEl.textContent = 'Please enter an abbreviation.'; return; }
  if (abbr.length < 2 || abbr.length > 4) { errEl.textContent = 'Abbreviation must be 2-4 characters.'; return; }
  if (!/^[A-Z]+$/.test(abbr)) { errEl.textContent = 'Abbreviation must be letters only.'; return; }

  document.getElementById('team-modal-submit').textContent = 'Saving…';
  document.getElementById('team-modal-submit').disabled = true;

  try {
    const resp = await fetch('/api/team', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, abbr, primaryColor: primary, secondaryColor: secondary }),
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      errEl.textContent = data.error || 'Server error';
    } else {
      state.standings = data.standings;
      state.teams     = data.teams;
      // Register new colors in frontend
      COLORS[abbr] = { p: primary, s: secondary };
      updateMatchweek();
      render();
      populateTeamSelects();
      closeTeamModal();
      showToast(`✓ ${name} (${abbr}) added to the league!`);
    }
  } catch(e) {
    errEl.textContent = 'Network error: ' + e.message;
  } finally {
    document.getElementById('team-modal-submit').textContent = 'Add Team';
    document.getElementById('team-modal-submit').disabled = false;
  }
});

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'err' : '';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display='none'; }, 3500);
}

  document.getElementById('content').innerHTML =

      <div style="color:#555;font-size:13px;">Make sure the Java server is running on port 8080</div>
      <div style="color:#444;font-size:11px;margin-top:8px;">${err.message}</div>
    </div>`;
});
